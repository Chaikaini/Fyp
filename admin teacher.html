    <!-- Schedule -->
    <h1 class="mb-4">View My Schedule</h1>
    <div class="card">
      <div class="card-header">
        <form class="d-flex ms-auto">
          <input class="form-control me-2" type="search" placeholder="Search with Teacher ID" id="search" />
          <button class="btn btn-outline-success" type="button" id="search-btn">Search</button>
      </div>
      <div class="card-body">
        <table class="table table-striped">
            <thead>
              <tr>
                <th>Subject ID</th>
                <th>Subject Name</th>
                <th>Class ID</th>
                <th>Year</th>
                <th>Time</th>
                <th>Teacher ID</th>
              </tr>
            </thead>
            <tbody id="schedule-table-body">
              <!-- JS will insert rows here -->
            </tbody>
          </table>
      </div>
    </div>
  </div>
</body>

 

  
<script>
  
  document.getElementById("search-btn").addEventListener("click", function () {
    const teacherId = document.getElementById("search").value;

    fetch("teacher_schedule.php", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "teacher_id=" + encodeURIComponent(teacherId),
    })
      .then((res) => res.json())
      .then((data) => {
        const tbody = document.getElementById("schedule-table-body");
        tbody.innerHTML = ""; // Clear previous rows

        if (data.length === 0) {
          tbody.innerHTML = "<tr><td colspan='6'>No data found.</td></tr>";
        } else {
          data.forEach((row) => {
            tbody.innerHTML += `
              <tr>
                <td>${row.subject_id}</td>
                <td>${row.subject_name}</td>
                <td>${row.class_id}</td>
                <td>${row.year}</td>
                <td>${row.time}</td>
                <td>${row.teacher_id}</td>
              </tr>
            `;
          });
        }
      });
  });
</script>
